name: Tests
on:
  push:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'pull_request') || (github.event.pull_request.head.repo.fork) }}
    outputs:
      changes: ${{ steps.detect-changes.outputs.changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: detect-changes
        with:
          base: v0
          filters: |
            package-json: &package-json
              - package.json
              - pnpm-lock.yaml

            docs: &docs
              - docs/**/*

            src: &src
              - extra/**/*.js
              - src/**/*.ts
              - gulpfile.js
              - tsconfig.json
              - *package-json

            src-or-tests: &src-or-tests
              - *src
              - test/**/*
              - .c8rc.json
              - .github/workflows/test/**/*
              - .github/workflows/test*.yml
              - .mocharc.json

            lint: &lint
              - *src-or-tests
              - .prettierrc.json
              - eslint.config.mjs

  formatting:
    if: contains(needs.detect-changes.outputs.changes, 'lint')
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run format:ci

  docs:
    if: contains(needs.detect-changes.outputs.changes, 'docs')
    needs: detect-changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  build:
    if: contains(needs.detect-changes.outputs.changes, 'src-or-tests')
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run compile
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: build/
          retention-days: 1

  tests-linux:
    if: contains(needs.detect-changes.outputs.changes, 'src-or-tests')
    needs: [detect-changes, build]
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    uses: ./.github/workflows/tests-linux.yml
    with:
      node-version: ${{matrix.node-version}}

  tests-windows:
    if: contains(needs.detect-changes.outputs.changes, 'src-or-tests')
    needs: [detect-changes, build]
    uses: ./.github/workflows/tests-windows.yml
    with:
      node-version: 20

  coverage:
    if: contains(needs.detect-changes.outputs.changes, 'src-or-tests')
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-linux, tests-windows]
    steps:
      - uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          parallel-finished: true

  all-passed:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - coverage
      - docs
      - formatting
      - tests-linux
      - tests-windows
    steps:
      - run: exit ${{ contains(needs.*.result, 'failure') && 1 || 0 }}
