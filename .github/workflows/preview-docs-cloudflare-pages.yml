name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/preview-docs-cloudflare-pages.yml"

concurrency:
  group: preview-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: docs

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./docs
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ./docs
        run: pnpm run build

      - name: Deploy preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=typeorm --branch=${{ github.head_ref }}

      - name: Comment preview URL
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            ### 📄 Docs Preview

            <table><tr><td><strong>Commit</strong></td><td><code>${{ github.event.pull_request.head.sha }}</code></td></tr>
            <tr><td><strong>Status</strong></td><td>✅ Deploy successful!</td></tr>
            <tr><td><strong>Preview URL</strong></td><td><a href="${{ steps.deploy.outputs.deployment-url }}">${{ steps.deploy.outputs.deployment-url }}</a></td></tr>
            <tr><td><strong>Branch Preview</strong></td><td><a href="${{ steps.deploy.outputs.pages-deployment-alias-url }}">${{ steps.deploy.outputs.pages-deployment-alias-url }}</a></td></tr></table>

      - name: Comment deployment failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            ### 📄 Docs Preview

            <table><tr><td><strong>Commit</strong></td><td><code>${{ github.event.pull_request.head.sha }}</code></td></tr>
            <tr><td><strong>Status</strong></td><td>❌ Deploy failed!</td></tr></table>

            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
