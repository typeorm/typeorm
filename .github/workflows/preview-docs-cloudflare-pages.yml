name: Preview Docs on Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - ".github/workflows/preview-docs-cloudflare-pages.yml"

concurrency:
  group: preview-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Preview Docs
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: docs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./docs
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: ./docs
        run: pnpm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=typeorm --branch=${{ github.head_ref }}

      - name: Comment preview URL
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            ### 📄 Docs Preview

            | | |
            |---|---|
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ✅ Deploy successful! |
            | **Preview URL** | ${{ steps.deploy.outputs.deployment-url }} |
            | **Branch Preview** | ${{ steps.deploy.outputs.pages-deployment-alias-url }} |

            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Comment deployment failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            ### 📄 Docs Preview

            | | |
            |---|---|
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ❌ Deploy failed! |

            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
