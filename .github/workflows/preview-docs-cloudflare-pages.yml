name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/preview-docs-cloudflare-pages.yml"

concurrency:
  group: preview-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: docs

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: ./docs

      - run: pnpm run build
        working-directory: ./docs

      - name: Get timestamp
        id: timestamp
        run: echo "time=$(date -u +'%b %-d, %Y %-I:%M%p')" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=typeorm --branch=${{ github.head_ref }}

      - name: Comment preview URL
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            | Project | Deployment | Actions | Updated (UTC) |
            |---------|------------|---------|---------------|
            | **typeorm-docs** | ✅ Ready | <a href="${{ steps.deploy.outputs.deployment-url }}">Preview</a> | ${{ steps.timestamp.outputs.time }} |

      - name: Comment deployment failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            | Project | Deployment | Actions | Updated (UTC) |
            |---------|------------|---------|---------------|
            | **typeorm-docs** | ❌ Failed | <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Logs</a> | ${{ steps.timestamp.outputs.time }} |
