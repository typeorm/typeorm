name: Publish Package to npmjs
on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      # registry-url is deliberately omitted: with Trusted Publishing, the npm
      # CLI handles OIDC auth automatically. Setting registry-url would create
      # an .npmrc with an empty auth token placeholder that blocks the OIDC flow.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - run: npm install -g npm@latest
      - run: pnpm install
      - run: pnpm run package
      - run: |
          cd build/package
          pnpm publish --provenance --access public --no-git-checks --ignore-scripts
