name: Publish Package to npmjs
on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # registry-url is deliberately omitted: with Trusted Publishing, the npm
      # CLI handles OIDC auth automatically. Setting registry-url would create
      # an .npmrc with an empty auth token placeholder that blocks the OIDC flow.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: "pnpm"
      - run: npm install -g npm@11
      - run: pnpm install
      - run: pnpm run package
      - run: |
          cd build/package
          pnpm publish --provenance --access public --no-git-checks --ignore-scripts
